name: CI/CD on github
on:  [push, pull_request]
jobs:
  build-linux:
    name: build with ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
        include:
          - compiler: g++
            install: g++
          - compiler: clang++
            install: clang
    steps:
      - name: check code
        uses: actions/checkout@v4
      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.install }}
      - name: configure with CMake
        run: cmake -H. -B_build -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
      - name: build project
        run: cmake --build _build
      - name: run tests
        run: |
          cd _build
          ctest --output-on-failure
  build-windows:
    name: build with VS 
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: configure with CMakeS
        run:  cmake -S . -B _build
      - name: build project
        run: cmake --build _build --config Release
      - name: run tests
        run: |
          cd _build
          ctest --output-on-failure